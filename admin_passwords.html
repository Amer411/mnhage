<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة كلمات المرور - المنهج الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0118;
            --card: rgba(255, 255, 255, 0.06);
            --accent: #ec4899;
            --secondary: #8b5cf6;
            --text: #f0e6ff;
            --error: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        
        .json-viewer {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            color: #10b981;
            font-size: 0.9rem;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--secondary); }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-get { background: var(--secondary); color: white; }
        .btn-patch { background: #3b82f6; color: white; }
        .btn-post { background: #10b981; color: white; }
        .btn-put { background: #f59e0b; color: white; }
        .btn-delete { background: var(--error); color: white; }
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        #status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Users Table */
        .users-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        .users-table th, .users-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .users-table th {
            background: rgba(139, 92, 246, 0.2);
            color: var(--secondary);
        }
        .users-table tr:hover { background: rgba(255, 255, 255, 0.03); }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        /* Password Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h1>دخول المشرف</h1>
            <input type="password" id="admin-pass" placeholder="كلمة مرور لوحة التحكم">
            <button class="btn btn-get" style="width: 100%;" onclick="checkAuth()">دخول</button>
        </div>
    </div>

    <div class="container">
        <h1>إدارة بيانات الموقع</h1>
        
        <label>البيانات الحالية (JSON):</label>
        <div id="json-viewer" class="json-viewer">جاري تحميل البيانات...</div>

        <div class="input-group">
            <label>إدخال بيانات جديدة (كلمة مرور أو JSON):</label>
            <textarea id="json-input" placeholder='مثال: "123456" أو {"key": "value"}'></textarea>
        </div>

        <div class="actions-grid">
            <button class="btn btn-get" onclick="getDatabase()">
                <span>🔄</span> تحديث العرض
            </button>
            <button class="btn btn-patch" onclick="sendRequest('PATCH')">
                <span>➕</span> إضافة (PATCH)
            </button>
            <button class="btn btn-post" onclick="sendRequest('POST')">
                <span>📝</span> إرسال (POST)
            </button>
            <button class="btn btn-put" onclick="sendRequest('PUT')">
                <span>⚠️</span> استبدال (PUT)
            </button>
            <button class="btn btn-delete" onclick="confirmDelete()">
                <span>🗑️</span> مسح شامل (Delete)
            </button>
        </div>

        <div id="status" class="hidden"></div>

        <div class="users-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>المستخدمين المسجلين (used_passwords):</label>
                <button class="btn btn-get btn-small" onclick="fetchUsers()">تحديث القائمة</button>
            </div>
            <table class="users-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>كلمة المرور</th>
                        <th>رقم المستخدم (ID)</th>
                        <th>تاريخ الدخول</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="users-list">
                    <tr><td colspan="5" style="text-align:center;">جاري تحميل المستخدمين...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const FIREBASE_URL = 'https://almnhag-f48fd-default-rtdb.firebaseio.com/.json';

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'amr123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                getDatabase();
                fetchUsers();
            } else {
                alert('كلمة المرور غير صحيحة');
            }
        }

        async function fetchUsers() {
            try {
                showStatus('جاري تحديث القائمة...', 'secondary');
                const resp = await fetch('https://almnhag-f48fd-default-rtdb.firebaseio.com/active_sessions.json');
                const data = await resp.json() || {};
                
                const tbody = document.getElementById('users-list');
                tbody.innerHTML = '';

                const passwords = Object.keys(data);

                if (passwords.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا يوجد مستخدمون نشطون حالياً</td></tr>';
                    showStatus('القائمة فارغة', 'success');
                    return;
                }

                // Convert to array and sort by last_active
                const users = passwords.map(pw => ({
                    password: pw,
                    ...data[pw]
                })).sort((a, b) => b.last_active - a.last_active);

                users.forEach((user, index) => {
                    const date = user.last_active ? new Date(user.last_active * 1000).toLocaleString('ar-YE') : '---';
                    const tr = document.createElement('tr');
                    const isKicked = user.status === 'kicked';
                    const statusText = isKicked ? '<span style="color:#ef4444">❌ موقوف</span>' : '<span style="color:#10b981">● متصل</span>';
                    
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td style="color:var(--accent); font-weight:bold;">${user.password}</td>
                        <td>${user.user_id || '---'}</td>
                        <td style="font-size:0.85rem;">${date} <br> ${statusText}</td>
                        <td style="display:flex; gap:5px;">
                            <button class="btn btn-delete btn-small" onclick="kickUser('${user.password}')" ${isKicked ? 'disabled' : ''}>طرد</button>
                            <button class="btn btn-put btn-small" onclick="resetUser('${user.password}')">تصفير</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                showStatus('تم تحديث القائمة', 'success');
            } catch (err) {
                console.error(err);
                showStatus('فشل جلب قائمة المستخدمين', 'error');
            }
        }

        async function kickUser(password) {
            if (!confirm(`هل أنت متأكد من طرد المستخدم (${password})؟ سيتم إيقاف الكرت نهائياً ولن يتمكن أحد من استخدامه.`)) return;
            
            try {
                const encodedPw = encodeURIComponent(password).replace(/\./g, '%2E');
                const resp = await fetch(`https://almnhag-f48fd-default-rtdb.firebaseio.com/active_sessions/${encodedPw}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'kicked' }),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (resp.ok) {
                    showStatus('تم الطرد والإيقاف بنجاح ✅', 'success');
                    fetchUsers();
                }
            } catch (err) {
                showStatus('فشل الطرد ❌', 'error');
            }
        }

        async function resetUser(password) {
            if (!confirm(`هل أنت متأكد من تصفير كلمة المرور (${password})؟ سيؤدي هذا لمسح سجلها وإتاحتها للاستخدام من جديد.`)) return;
            
            try {
                const encodedPw = encodeURIComponent(password).replace(/\./g, '%2E');
                const resp = await fetch(`https://almnhag-f48fd-default-rtdb.firebaseio.com/active_sessions/${encodedPw}.json`, {
                    method: 'DELETE'
                });
                if (resp.ok) {
                    showStatus('تم التصفير بنجاح ✅', 'success');
                    fetchUsers();
                }
            } catch (err) {
                showStatus('فشل التصفير ❌', 'error');
            }
        }

        async function getDatabase() {
            showStatus('جاري التحميل...', 'secondary');
            try {
                const resp = await fetch(FIREBASE_URL);
                const data = await resp.json();
                document.getElementById('json-viewer').textContent = JSON.stringify(data, null, 4);
                showStatus('تم تحديث البيانات', 'success');
            } catch (err) {
                showStatus('خطأ في الاتصال', 'error');
            }
        }

        async function sendRequest(method) {
            const input = document.getElementById('json-input').value.trim();
            if (!input && method !== 'GET' && method !== 'DELETE') {
                alert('يرجى إدخال بيانات أولاً');
                return;
            }

            let data;
            try {
                // Try to parse as JSON, if fails, treat as string
                data = JSON.parse(input);
            } catch (e) {
                data = input; 
            }

            showStatus('جاري التنفيذ...', 'secondary');

            try {
                const fetchOptions = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };

                if (method !== 'GET' && method !== 'DELETE') {
                    fetchOptions.body = JSON.stringify(data);
                }

                const resp = await fetch(FIREBASE_URL, {
                    method: method,
                    body: (method !== 'GET' && method !== 'DELETE') ? JSON.stringify(data) : undefined,
                    headers: { 'Content-Type': 'application/json' }
                });

                if (resp.ok) {
                    showStatus('تمت العملية بنجاح ✅', 'success');
                    getDatabase();
                    document.getElementById('json-input').value = '';
                } else {
                    showStatus('فشلت العملية ❌: ' + resp.status, 'error');
                }
            } catch (err) {
                showStatus('خطأ في الاتصال ❌', 'error');
            }
        }

        function confirmDelete() {
            if (confirm('⚠️ تحذير: أنت على وشك مسح قاعدة البيانات بالكامل! هل أنت متأكد؟')) {
                sendRequest('DELETE');
            }
        }

        function showStatus(text, type) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.classList.remove('hidden');
            status.style.color = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#8b5cf6');
            
            if (type === 'success') {
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        }

        // Allow Enter key in auth
        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });
    </script>
</body>
</html>

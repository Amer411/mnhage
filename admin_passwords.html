<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة كلمات المرور - المنهج الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0118;
            --card: rgba(255, 255, 255, 0.06);
            --accent: #ec4899;
            --secondary: #8b5cf6;
            --text: #f0e6ff;
            --error: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        
        .json-viewer {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            color: #10b981;
            font-size: 0.9rem;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--secondary); }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-get { background: var(--secondary); color: white; }
        .btn-patch { background: #3b82f6; color: white; }
        .btn-post { background: #10b981; color: white; }
        .btn-put { background: #f59e0b; color: white; }
        .btn-delete { background: var(--error); color: white; }
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        #status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        /* Search & Filter */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .search-bar input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .search-bar input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
        .filter-btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--secondary);
            border-color: var(--secondary);
        }
        .filter-btn:hover { border-color: var(--secondary); }

        /* Users Table */
        .users-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .users-table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.2);
        }
        .users-table th, .users-table td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }
        .users-table th {
            background: rgba(139, 92, 246, 0.2);
            color: var(--secondary);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .users-table tr:hover { background: rgba(255, 255, 255, 0.03); }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .page-btn:hover { border-color: var(--secondary); }
        .page-btn.active {
            background: var(--secondary);
            border-color: var(--secondary);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-info {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }

        /* Password Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 600px) {
            .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-card { padding: 10px 6px; }
            .stat-num { font-size: 1.3rem; }
            .users-table th, .users-table td { padding: 8px 6px; font-size: 0.8rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h1>دخول المشرف</h1>
            <input type="password" id="admin-pass" placeholder="كلمة مرور لوحة التحكم">
            <button class="btn btn-get" style="width: 100%;" onclick="checkAuth()">دخول</button>
        </div>
    </div>

    <div class="container">
        <h1>إدارة بيانات الموقع</h1>
        
        <label>البيانات الحالية (JSON):</label>
        <div id="json-viewer" class="json-viewer">جاري تحميل البيانات...</div>

        <!-- Add Passwords Section -->
        <div style="background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px;">
            <label style="color: var(--success); font-size: 1.1rem;">➕ إضافة كلمات مرور جديدة:</label>
            <textarea id="passwords-input" placeholder="اكتب كلمات المرور هنا (كل كلمة مرور في سطر جديد)&#10;مثال:&#10;776964284&#10;718007951&#10;730046378" style="width:100%; height:120px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:white; padding:12px; font-family:inherit; resize:vertical; box-sizing:border-box; margin-bottom:12px;"></textarea>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-post" onclick="addPasswords()" style="flex:1; min-width:150px;">
                    <span>🔑</span> إضافة كلمات المرور
                </button>
                <button class="btn btn-get" onclick="getDatabase()" style="flex:0.5; min-width:120px;">
                    <span>🔄</span> تحديث العرض
                </button>
            </div>
        </div>

        <!-- Advanced JSON Tools (collapsed) -->
        <details style="margin-bottom: 20px;">
            <summary style="cursor:pointer; color:var(--secondary); font-weight:bold; padding:10px 0;">⚙️ أدوات متقدمة (JSON)</summary>
            <div style="margin-top:10px;">
                <div class="input-group">
                    <label>إدخال بيانات JSON:</label>
                    <textarea id="json-input" placeholder='{"key": "value"}'></textarea>
                </div>
                <div class="actions-grid">
                    <button class="btn btn-patch" onclick="sendRequest('PATCH')">
                        <span>➕</span> إضافة (PATCH)
                    </button>
                    <button class="btn btn-post" onclick="sendRequest('POST')">
                        <span>📝</span> إرسال (POST)
                    </button>
                    <button class="btn btn-put" onclick="sendRequest('PUT')">
                        <span>⚠️</span> استبدال (PUT)
                    </button>
                    <button class="btn btn-delete" onclick="confirmDelete()">
                        <span>🗑️</span> مسح شامل (Delete)
                    </button>
                </div>
            </div>
        </details>

        <div id="status" class="hidden"></div>

        <div class="users-section">
            <!-- Stats -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat-card">
                    <div class="stat-num" id="stat-total">0</div>
                    <div class="stat-label">إجمالي</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-active" style="color: var(--success);">0</div>
                    <div class="stat-label">نشط</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-kicked" style="color: var(--error);">0</div>
                    <div class="stat-label">موقوف</div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label style="margin-bottom:0;">المستخدمين المسجلين:</label>
                <button class="btn btn-get btn-small" onclick="fetchUsers()">🔄 تحديث القائمة</button>
            </div>

            <!-- Search & Filter -->
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="🔍 بحث بكلمة المرور أو رقم المستخدم..." oninput="applyFilters()">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">الكل</button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active')">نشط</button>
                <button class="filter-btn" data-filter="kicked" onclick="setFilter('kicked')">موقوف</button>
            </div>

            <div class="users-table-wrapper">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th>كلمة المرور</th>
                            <th>رقم المستخدم (ID)</th>
                            <th>تاريخ الدخول</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="users-list">
                        <tr><td colspan="5" style="text-align:center;">جاري تحميل المستخدمين...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = 'https://almnhag-f48fd-default-rtdb.firebaseio.com/.json';
        const FIREBASE_BASE = 'https://almnhag-f48fd-default-rtdb.firebaseio.com';

        // State
        let allUsers = [];
        let filteredUsers = [];
        let currentPage = 1;
        let currentFilter = 'all';
        const USERS_PER_PAGE = 50;

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'amr123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                getDatabase();
                fetchUsers();
            } else {
                alert('كلمة المرور غير صحيحة');
            }
        }

        async function fetchUsers() {
            try {
                showStatus('جاري تحديث القائمة...', 'secondary');
                const resp = await fetch(`${FIREBASE_BASE}/active_sessions.json`);
                const data = await resp.json() || {};
                
                const passwords = Object.keys(data);

                if (passwords.length === 0) {
                    allUsers = [];
                    updateStats();
                    renderCurrentPage();
                    showStatus('القائمة فارغة', 'success');
                    return;
                }

                // Convert to array and sort by user_id (ascending)
                allUsers = passwords.map(pw => ({
                    password: pw,
                    ...data[pw]
                })).sort((a, b) => {
                    const idA = Number(a.user_id) || 999999;
                    const idB = Number(b.user_id) || 999999;
                    return idA - idB;
                });

                updateStats();
                currentPage = 1;
                applyFilters();
                showStatus(`تم تحميل ${allUsers.length} مستخدم`, 'success');
            } catch (err) {
                console.error(err);
                showStatus('فشل جلب قائمة المستخدمين', 'error');
            }
        }

        function updateStats() {
            const total = allUsers.length;
            const active = allUsers.filter(u => u.status !== 'kicked').length;
            const kicked = allUsers.filter(u => u.status === 'kicked').length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-kicked').textContent = kicked;
        }

        function setFilter(filter) {
            currentFilter = filter;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.trim().toLowerCase();

            filteredUsers = allUsers.filter(user => {
                // Filter by status
                if (currentFilter === 'active' && user.status === 'kicked') return false;
                if (currentFilter === 'kicked' && user.status !== 'kicked') return false;

                // Filter by search
                if (search) {
                    const pw = String(user.password).toLowerCase();
                    const uid = String(user.user_id || '').toLowerCase();
                    if (!pw.includes(search) && !uid.includes(search)) return false;
                }

                return true;
            });

            // Ensure current page is valid
            const maxPage = Math.max(1, Math.ceil(filteredUsers.length / USERS_PER_PAGE));
            if (currentPage > maxPage) currentPage = maxPage;

            renderCurrentPage();
            renderPagination();
        }

        function renderCurrentPage() {
            const tbody = document.getElementById('users-list');

            if (filteredUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا يوجد نتائج</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const start = (currentPage - 1) * USERS_PER_PAGE;
            const end = Math.min(start + USERS_PER_PAGE, filteredUsers.length);
            const pageUsers = filteredUsers.slice(start, end);

            // Use DocumentFragment for performance
            const fragment = document.createDocumentFragment();

            pageUsers.forEach((user, i) => {
                const globalIndex = start + i + 1;
                const date = user.last_active ? new Date(user.last_active * 1000).toLocaleString('ar-YE') : '---';
                const isKicked = user.status === 'kicked';
                const statusText = isKicked 
                    ? '<span style="color:#ef4444">❌ موقوف</span>' 
                    : '<span style="color:#10b981">● نشط</span>';

                const tr = document.createElement('tr');
                // Escape password for onclick - use data attribute instead
                tr.innerHTML = `
                    <td>${globalIndex}</td>
                    <td style="color:var(--accent); font-weight:bold; word-break:break-all;">${escapeHtml(user.password)}</td>
                    <td>${user.user_id || '---'}</td>
                    <td style="font-size:0.82rem;">${date}<br>${statusText}</td>
                    <td style="display:flex; gap:5px; flex-wrap:wrap;">
                        <button class="btn btn-delete btn-small" data-action="kick" data-pw="${escapeAttr(user.password)}" ${isKicked ? 'disabled' : ''}>طرد</button>
                        <button class="btn btn-put btn-small" data-action="reset" data-pw="${escapeAttr(user.password)}">تصفير</button>
                    </td>
                `;
                fragment.appendChild(tr);
            });

            tbody.innerHTML = '';
            tbody.appendChild(fragment);

            // Attach event listeners via delegation (already handled below)
        }

        function renderPagination() {
            const totalPages = Math.max(1, Math.ceil(filteredUsers.length / USERS_PER_PAGE));
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = `<span class="page-info">عرض ${filteredUsers.length} مستخدم</span>`;
                return;
            }

            let html = '';

            // Previous button
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>→ السابق</button>`;

            // Page numbers - show smart range
            const pages = getPageRange(currentPage, totalPages);
            let lastPage = 0;
            pages.forEach(p => {
                if (p - lastPage > 1) {
                    html += `<span class="page-info">...</span>`;
                }
                html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                lastPage = p;
            });

            // Next button
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}">التالي ←</button>`;

            // Info
            const start = (currentPage - 1) * USERS_PER_PAGE + 1;
            const end = Math.min(currentPage * USERS_PER_PAGE, filteredUsers.length);
            html += `<div style="width:100%; text-align:center;"><span class="page-info">${start}-${end} من ${filteredUsers.length}</span></div>`;

            container.innerHTML = html;
        }

        function getPageRange(current, total) {
            const pages = new Set();
            // Always show first and last
            pages.add(1);
            pages.add(total);
            // Show current and neighbors
            for (let i = Math.max(1, current - 2); i <= Math.min(total, current + 2); i++) {
                pages.add(i);
            }
            return [...pages].sort((a, b) => a - b);
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredUsers.length / USERS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderCurrentPage();
            renderPagination();
            // Scroll to table top
            document.querySelector('.users-table-wrapper')?.scrollTo(0, 0);
        }

        // Event delegation for kick/reset buttons
        document.getElementById('users-list').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const pw = btn.dataset.pw;
            if (action === 'kick') kickUser(pw);
            if (action === 'reset') resetUser(pw);
        });

        async function kickUser(password) {
            if (!confirm(`هل أنت متأكد من طرد المستخدم (${password})؟ سيتم إيقاف الكرت نهائياً.`)) return;
            
            try {
                const encodedPw = encodeURIComponent(password).replace(/\./g, '%2E');
                const resp = await fetch(`${FIREBASE_BASE}/active_sessions/${encodedPw}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'kicked' }),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (resp.ok) {
                    // Update local data instead of re-fetching
                    const user = allUsers.find(u => u.password === password);
                    if (user) user.status = 'kicked';
                    updateStats();
                    applyFilters();
                    showStatus('تم الطرد والإيقاف بنجاح ✅', 'success');
                }
            } catch (err) {
                showStatus('فشل الطرد ❌', 'error');
            }
        }

        async function resetUser(password) {
            if (!confirm(`هل أنت متأكد من تصفير كلمة المرور (${password})؟ سيتم مسح سجلها.`)) return;
            
            try {
                const encodedPw = encodeURIComponent(password).replace(/\./g, '%2E');
                // Delete from active_sessions
                const resp = await fetch(`${FIREBASE_BASE}/active_sessions/${encodedPw}.json`, {
                    method: 'DELETE'
                });
                // Also delete from used_passwords so it can be reused
                await fetch(`${FIREBASE_BASE}/used_passwords/${encodedPw}.json`, {
                    method: 'DELETE'
                }).catch(() => {});

                if (resp.ok) {
                    // Update local data
                    allUsers = allUsers.filter(u => u.password !== password);
                    updateStats();
                    applyFilters();
                    showStatus('تم التصفير بنجاح ✅', 'success');
                }
            } catch (err) {
                showStatus('فشل التصفير ❌', 'error');
            }
        }

        async function getDatabase() {
            showStatus('جاري التحميل...', 'secondary');
            try {
                const resp = await fetch(FIREBASE_URL);
                const data = await resp.json();
                document.getElementById('json-viewer').textContent = JSON.stringify(data, null, 4);
                showStatus('تم تحديث البيانات', 'success');
            } catch (err) {
                showStatus('خطأ في الاتصال', 'error');
            }
        }

        async function addPasswords() {
            const input = document.getElementById('passwords-input').value.trim();
            if (!input) {
                alert('يرجى إدخال كلمات المرور أولاً');
                return;
            }

            // Parse passwords: one per line, trim whitespace, remove empty
            const passwords = input.split('\n')
                .map(p => p.trim())
                .filter(p => p.length > 0);

            if (passwords.length === 0) {
                alert('لم يتم العثور على كلمات مرور صالحة');
                return;
            }

            showStatus(`جاري إضافة ${passwords.length} كلمة مرور...`, 'secondary');

            try {
                // Build the object: { "password1": "password1", "password2": "password2", ... }
                const passwordsObj = {};
                passwords.forEach(pw => {
                    passwordsObj[pw] = pw;
                });

                // PATCH to /passwords/ node (merges with existing)
                const resp = await fetch(`${FIREBASE_BASE}/passwords.json`, {
                    method: 'PATCH',
                    body: JSON.stringify(passwordsObj),
                    headers: { 'Content-Type': 'application/json' }
                });

                if (resp.ok) {
                    showStatus(`تم إضافة ${passwords.length} كلمة مرور بنجاح ✅`, 'success');
                    document.getElementById('passwords-input').value = '';
                    getDatabase();
                } else {
                    showStatus('فشلت الإضافة ❌: ' + resp.status, 'error');
                }
            } catch (err) {
                showStatus('خطأ في الاتصال ❌', 'error');
            }
        }

        async function sendRequest(method) {
            const input = document.getElementById('json-input').value.trim();
            if (!input && method !== 'GET' && method !== 'DELETE') {
                alert('يرجى إدخال بيانات أولاً');
                return;
            }

            let data;
            try {
                data = JSON.parse(input);
            } catch (e) {
                data = input; 
            }

            showStatus('جاري التنفيذ...', 'secondary');

            try {
                const resp = await fetch(FIREBASE_URL, {
                    method: method,
                    body: (method !== 'GET' && method !== 'DELETE') ? JSON.stringify(data) : undefined,
                    headers: { 'Content-Type': 'application/json' }
                });

                if (resp.ok) {
                    showStatus('تمت العملية بنجاح ✅', 'success');
                    getDatabase();
                    document.getElementById('json-input').value = '';
                } else {
                    showStatus('فشلت العملية ❌: ' + resp.status, 'error');
                }
            } catch (err) {
                showStatus('خطأ في الاتصال ❌', 'error');
            }
        }

        function confirmDelete() {
            if (confirm('⚠️ تحذير: أنت على وشك مسح قاعدة البيانات بالكامل! هل أنت متأكد؟')) {
                sendRequest('DELETE');
            }
        }

        function showStatus(text, type) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.classList.remove('hidden');
            status.style.color = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#8b5cf6');
            
            if (type === 'success') {
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        }

        // Helper: escape HTML to prevent XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Helper: escape for HTML attributes
        function escapeAttr(str) {
            return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Allow Enter key in auth
        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });
    </script>
</body>
</html>
